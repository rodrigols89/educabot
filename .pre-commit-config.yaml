repos:
  - repo: local
    hooks:

      # --------------------------------------------------------
      #  LINT (somente quando arquivos Python mudarem)
      # --------------------------------------------------------
      - id: ruff-lint
        name: Check Lint (Ruff)
        entry: make lint
        language: system
        types: [python]
        pass_filenames: false
        exclude: ^(alembic/versions/|app/utils/insert_gestores\.py$)

